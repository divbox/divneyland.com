<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Divneyland</title>

  <script>document.documentElement.setAttribute('data-theme', localStorage.getItem('dv-theme') || 'campfire');</script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/theme.css" />
  <link rel="stylesheet" href="css/gallery.css" />
</head>
<body>

  <div id="site-nav"></div>

  <main class="container my-5">
    <h1 class="mb-1">Gallery</h1>
    <p class="text-muted mb-4">Family photos across the years.</p>

    <div class="dv-filters d-flex flex-wrap gap-2 mb-4" id="filterBar">
      <span class="dv-filter-label">Filter by:</span>
    </div>

    <div class="dv-grid" id="photoGrid">
      <p class="text-muted">No photos yet — add entries to <code>data/photos.json</code>.</p>
    </div>
  </main>

  <div class="modal fade" id="lightbox" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content dv-lightbox-content">
        <button type="button" class="btn-close dv-lightbox-close"
                data-bs-dismiss="modal" aria-label="Close"></button>
        <img id="lightboxImg" src="" alt="" class="dv-lightbox-img" />
        <div class="dv-lightbox-caption" id="lightboxCaption"></div>
      </div>
    </div>
  </div>

  <footer class="dv-footer text-center py-4 mt-5">
    <p class="mb-0">Made with ❤️ by the family · <a href="about.html">About</a></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
